<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aʀᴛㅤᴇᴜʀᴏㅤ❕ - NEXUS EFFECT</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; color: #0ff; font-family: 'Courier New', monospace; }
        canvas { display: block; filter: drop-shadow(0 0 8px #0ff); }
        
        .ui-overlay {
            position: absolute;
            bottom: 30px;
            width: 100%;
            text-align: center;
            display: flex;
            flex-direction: column;
            gap: 15px;
            align-items: center;
            pointer-events: none;
        }

        .btn-whatsapp {
            background: #25D366;
            color: white;
            padding: 12px 25px;
            border-radius: 50px;
            text-decoration: none;
            font-weight: bold;
            box-shadow: 0 0 20px rgba(37, 211, 102, 0.5);
            animation: pulse 1.5s infinite;
            pointer-events: auto;
            font-family: sans-serif;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        .glitch-text {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 3px;
            opacity: 0.8;
            color: #f0f;
            text-shadow: 2px 2px #0ff;
        }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    
    <div class="ui-overlay">
        <div class="glitch-text">TOUCHER POUR DÉCOMPOSER</div>
        <a href="whatsapp://send?text=Regarde ce site de fou ! Touche l'écran pour voir l'effet : https://papaeuro.github.io/Mon-site/" class="btn-whatsapp">
            PARTAGER SUR WHATSAPP 🚀
        </a>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        let text = "Aʀᴛㅤᴇᴜʀᴏㅤ❕";

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        class Particle {
            constructor(x, y) {
                this.x = x; this.y = y;
                this.originX = x; this.originY = y;
                this.color = Math.random() > 0.5 ? '#0ff' : '#f0f';
                this.size = 2;
                this.vx = 0; this.vy = 0;
                this.friction = 0.9; this.ease = 0.05;
            }
            draw() {
                ctx.fillStyle = this.color;
                ctx.fillRect(this.x, this.y, this.size, this.size);
            }
            update(mx, my) {
                let dx = mx - this.x;
                let dy = my - this.y;
                let dist = Math.sqrt(dx*dx + dy*dy);
                if (dist < 100) {
                    let angle = Math.atan2(dy, dx);
                    this.vx -= Math.cos(angle) * 8;
                    this.vy -= Math.sin(angle) * 8;
                }
                this.vx *= this.friction; this.vy *= this.friction;
                this.x += this.vx + (this.originX - this.x) * this.ease;
                this.y += this.vy + (this.originY - this.y) * this.ease;
            }
        }

        function init() {
            ctx.fillStyle = 'white';
            ctx.font = 'bold 35px Arial';
            ctx.textAlign = 'center';
            ctx.fillText(text, canvas.width/2, canvas.height/2);
            const data = ctx.getImageData(0, 0, canvas.width, canvas.height).data;
            particles = [];
            for (let y = 0; y < canvas.height; y += 4) {
                for (let x = 0; x < canvas.width; x += 4) {
                    if (data[(y * canvas.width + x) * 4 + 3] > 128) {
                        particles.push(new Particle(x, y));
                    }
                }
            }
        }

        let mouse = { x: -500, y: -500 };
        const handleInteraction = e => {
            mouse.x = e.touches ? e.touches[0].clientX : e.clientX;
            mouse.y = e.touches ? e.touches[0].clientY : e.clientY;
        };
        window.addEventListener('mousemove', handleInteraction);
        window.addEventListener('touchstart', handleInteraction);

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => { p.update(mouse.x, mouse.y); p.draw(); });
            requestAnimationFrame(animate);
        }
        init(); animate();
        window.onresize = init;
    </script>

</body>
</html>
