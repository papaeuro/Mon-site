<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aʀᴛㅤᴇᴜʀᴏㅤ❕ - ENERGY CHALLENGE</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; color: #0ff; font-family: 'Courier New', monospace; }
        canvas { display: block; filter: drop-shadow(0 0 8px #0ff); }
        
        .ui-overlay {
            position: absolute;
            top: 20px;
            width: 100%;
            text-align: center;
            pointer-events: none;
        }

        #score-container {
            font-size: 24px;
            font-weight: bold;
            text-shadow: 0 0 10px #f0f;
            color: #fff;
        }

        .bottom-ui {
            position: absolute;
            bottom: 30px;
            width: 100%;
            text-align: center;
            display: flex;
            flex-direction: column;
            gap: 10px;
            align-items: center;
        }

        .btn-whatsapp {
            background: #25D366;
            color: white;
            padding: 10px 20px;
            border-radius: 50px;
            text-decoration: none;
            font-size: 14px;
            font-weight: bold;
            box-shadow: 0 0 15px rgba(37, 211, 102, 0.5);
            pointer-events: auto;
        }

        .level-text {
            font-size: 10px;
            color: #f0f;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>
    <div class="ui-overlay">
        <div id="score-container">ÉNERGIE : <span id="score">0</span></div>
        <div class="level-text" id="status">MODE : NORMAL</div>
    </div>

    <canvas id="canvas"></canvas>
    
    <div class="bottom-ui">
        <a href="whatsapp://send?text=J'ai atteint le niveau Ultra sur le site de Papa Euro ! Teste ici : https://papaeuro.github.io/Mon-site/" class="btn-whatsapp">
            DÉFIER UN AMI 🚀
        </a>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        let particles = [];
        let score = 0;
        let powerMode = false;

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        class Particle {
            constructor(x, y) {
                this.x = x; this.y = y;
                this.originX = x; this.originY = y;
                this.color = '#0ff';
                this.size = 2;
                this.vx = 0; this.vy = 0;
                this.friction = 0.9; this.ease = 0.05;
            }
            draw() {
                ctx.fillStyle = this.color;
                ctx.fillRect(this.x, this.y, this.size, this.size);
            }
            update(mx, my) {
                let dx = mx - this.x;
                let dy = my - this.y;
                let dist = Math.sqrt(dx*dx + dy*dy);
                if (dist < (powerMode ? 150 : 80)) {
                    let angle = Math.atan2(dy, dx);
                    let force = powerMode ? 15 : 8;
                    this.vx -= Math.cos(angle) * force;
                    this.vy -= Math.sin(angle) * force;
                }
                this.vx *= this.friction; this.vy *= this.friction;
                this.x += this.vx + (this.originX - this.x) * this.ease;
                this.y += this.vy + (this.originY - this.y) * this.ease;
            }
        }

        function init() {
            ctx.fillStyle = 'white';
            ctx.font = 'bold 35px Arial';
            ctx.textAlign = 'center';
            ctx.fillText("Aʀᴛㅤᴇᴜʀᴏㅤ❕", canvas.width/2, canvas.height/2);
            const data = ctx.getImageData(0, 0, canvas.width, canvas.height).data;
            particles = [];
            for (let y = 0; y < canvas.height; y += 4) {
                for (let x = 0; x < canvas.width; x += 4) {
                    if (data[(y * canvas.width + x) * 4 + 3] > 128) {
                        particles.push(new Particle(x, y));
                    }
                }
            }
        }

        window.addEventListener('touchstart', e => {
            let mx = e.touches[0].clientX;
            let my = e.touches[0].clientY;
            score += 1;
            document.getElementById('score').innerText = score;
            
            // Évolution du mode
            if (score > 100) {
                powerMode = true;
                document.getElementById('status').innerText = "MODE : ULTRA NEON";
                particles.forEach(p => p.color = '#f0f');
            }
            if (score > 300) {
                document.getElementById('status').innerText = "MODE : DIEU DU CODING ⚡";
                particles.forEach(p => p.color = '#fff');
            }

            particles.forEach(p => p.update(mx, my));
        });

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach(p => { 
                // Animation flottante automatique pour retenir le regard
                p.update(-1000, -1000); 
                p.draw(); 
            });
            requestAnimationFrame(animate);
        }
        init(); animate();
    </script>

</body>
</html>
