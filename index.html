<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Aʀᴛㅤᴇᴜʀᴏㅤ❕ - ULTIMATE CHALLENGE</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; color: #fff; font-family: 'Arial Black', sans-serif; }
        #ui-header { position: absolute; top: 20px; width: 100%; text-align: center; z-index: 100; pointer-events: none; }
        #score { font-size: 60px; background: linear-gradient(to bottom, #fff, #0ff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; filter: drop-shadow(0 0 15px #0ff); }
        
        /* MODAL DE RÉCOMPENSE */
        #reward-modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.95); display: none;
            justify-content: center; align-items: center; flex-direction: column;
            z-index: 10000;
        }
        #reward-modal.active { display: flex; }
        #reward-img { max-width: 85%; border-radius: 15px; box-shadow: 0 0 30px #0ff; margin-bottom: 20px; }

        .btn-group { display: flex; gap: 10px; }
        .btn-ui { padding: 12px 20px; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; text-decoration: none; font-family: sans-serif; }
        .btn-download { background: #0ff; color: #000; }
        .btn-close { background: #f0f; color: #fff; }

        canvas { display: block; }
        .floating-num { position: absolute; color: #f0f; font-weight: bold; pointer-events: none; animation: floatUp 0.8s forwards; z-index: 1000; }
        @keyframes floatUp { 0% { transform: translateY(0); opacity: 1; } 100% { transform: translateY(-100px); opacity: 0; } }
    </style>
</head>
<body id="body">

    <div id="ui-header">
        <div id="level-title" style="font-size: 12px; color: #f0f;">RANG : DÉBUTANT</div>
        <div id="score">0</div>
        <div id="next-goal" style="font-size: 10px; color: #0ff;">PROCHAIN : 100 🔋</div>
    </div>

    <div id="reward-modal">
        <div id="reward-title" style="font-size: 18px; margin-bottom: 15px; text-align: center;">NOUVEAU RANG DÉBLOQUÉ !</div>
        <img id="reward-img" src="" alt="Récompense">
        <div class="btn-group">
            <a id="download-link" href="#" download class="btn-ui btn-download">TÉLÉCHARGER 📥</a>
            <button id="close-reward" class="btn-ui btn-close">CONTINUER</button>
        </div>
    </div>

    <canvas id="canvas"></canvas>

    <script>
        const DIRECT_LINK = "https://www.profitablecpmratenetwork.com/zr3rrt9c?key=41a9267d8ee0f4fe87afc967f3adad71";
        let hasClickedOnce = false;
        let score = 0;
        
        const milestones = [100, 200, 300, 400, 500, 600, 800, 1000, 1500, 2000];
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        const scoreElement = document.getElementById('score');
        const rewardModal = document.getElementById('reward-modal');
        const rewardImg = document.getElementById('reward-img');
        const downloadLink = document.getElementById('download-link');

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        // --- GESTION DES CLICS ---
        const handleAction = (x, y) => {
            if (!hasClickedOnce) { window.open(DIRECT_LINK, '_blank'); hasClickedOnce = true; }

            score++;
            scoreElement.innerText = score;

            // Vérifier si un palier est atteint
            if (milestones.includes(score)) {
                showReward(score);
            }

            // Effets visuels
            const num = document.createElement('div');
            num.className = 'floating-num'; num.innerText = '+1';
            num.style.left = x + 'px'; num.style.top = y + 'px';
            document.getElementById('body').appendChild(num);
            setTimeout(() => num.remove(), 800);
        };

        function showReward(level) {
            const imgPath = `reward_${level}.png`;
            rewardImg.src = imgPath;
            downloadLink.href = imgPath;
            rewardModal.classList.add('active');
        }

        document.getElementById('close-reward').addEventListener('click', () => {
            rewardModal.classList.remove('active');
        });

        window.addEventListener('touchstart', e => {
            if (rewardModal.classList.contains('active')) return;
            handleAction(e.touches[0].clientX, e.touches[0].clientY);
        });

        // (Le reste du code d'animation des particules est identique à la V6...)
        // [Inclus ici dans ton fichier final pour que ça fonctionne]
    </script>
    
    <script src="https://pl29143512.profitablecpmratenetwork.com/c1/1d/2b/c11d2bf0222a5de5e208c200051fe32d.js"></script>
    <script src="https://pl29143513.profitablecpmratenetwork.com/ef/cb/38/efcb38ab03bf39732d0afef6c1c17655.js"></script>
</body>
</html>
