<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Aʀᴛㅤᴇᴜʀᴏㅤ❕ - NEON RUNNER RPG</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Teko:wght@500;700&display=swap');
        body { margin: 0; background: #050505; color: #fff; font-family: 'Teko', sans-serif; overflow: hidden; touch-action: manipulation; }
        
        /* HUD */
        #hud { position: absolute; top: 0; width: 100%; padding: 15px; box-sizing: border-box; z-index: 100; background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent); }
        .stats { display: flex; justify-content: space-between; font-size: 22px; color: #00d2ff; text-shadow: 0 0 10px #00d2ff; }
        .xp-box { width: 100%; background: #222; height: 12px; border-radius: 6px; margin-top: 8px; border: 1px solid #444; overflow: hidden; }
        #xp-bar { height: 100%; width: 0%; background: linear-gradient(90deg, #00d2ff, #f0f); transition: 0.3s; }

        canvas { display: block; background: #000; }

        /* MODAL RECOMPENSE */
        #reward-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 2000; }
        #reward-modal.active { display: flex; }
        #reward-img { width: 80%; max-width: 350px; border: 3px solid #f0f; border-radius: 15px; box-shadow: 0 0 30px #f0f; margin-bottom: 20px; }
        
        .btn-ui { padding: 12px 25px; border: none; font-family: 'Teko'; font-size: 20px; border-radius: 5px; text-decoration: none; cursor: pointer; }
        .btn-get { background: #00d2ff; color: #000; margin-right: 10px; }
        .btn-next { background: #f0f; color: #fff; }

        #msg { position: absolute; width: 100%; text-align: center; top: 50%; font-size: 30px; color: #f0f; pointer-events: none; opacity: 0; transition: 0.5s; }
    </style>
</head>
<body>

    <div id="hud">
        <div class="stats">
            <span id="rank-name">RANG : RECRUE</span>
            <span id="score-text">XP : 0</span>
        </div>
        <div class="xp-box"><div id="xp-bar"></div></div>
    </div>

    <div id="msg">SAUTE !</div>

    <canvas id="gameCanvas"></canvas>

    <div id="reward-modal">
        <h1 id="lvl-up-text" style="color:#0ff; text-shadow: 0 0 10px #0ff;">LEVEL UP !</h1>
        <img id="reward-img" src="" alt="Reward">
        <div style="display:flex;">
            <a id="dl-link" href="" download class="btn-ui btn-get">RÉCUPÉRER</a>
            <button onclick="closeLoot()" class="btn-ui btn-next">CONTINUER</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        // Configuration
        const DIRECT_LINK = "https://www.profitablecpmratenetwork.com/zr3rrt9c?key=41a9267d8ee0f4fe87afc967f3adad71";
        let hasClickedOnce = false;
        let score = 0;
        let milestones = [100, 500, 1000, 1300, 1500, 2000, 2600, 3000];
        let ranks = ["Recrue", "Bronze Antique", "Diamant Noir", "Cyber Élite", "Maître Éclat", "Mythe Phonk", "Art Euro Suprême", "Titan Cosmique", "Dieu Matrice"];

        // Game State
        let gameActive = true;
        let player = { x: 50, y: canvas.height - 100, w: 40, h: 40, dy: 0, jumpForce: 15, gravity: 0.8, grounded: false };
        let obstacles = [];
        let particles = [];
        let spawnTimer = 0;

        function spawnObstacle() {
            let size = 40 + Math.random() * 40;
            obstacles.push({ x: canvas.width, y: canvas.height - size - 50, w: 30, h: size, color: '#ff3366' });
        }

        function update() {
            if (!gameActive) return;

            // Gravité
            player.dy += player.gravity;
            player.y += player.dy;

            if (player.y + player.h > canvas.height - 50) {
                player.y = canvas.height - 50 - player.h;
                player.dy = 0;
                player.grounded = true;
            }

            // Obstacles
            spawnTimer++;
            if (spawnTimer > 80) { spawnObstacle(); spawnTimer = 0; }

            obstacles.forEach((obs, i) => {
                obs.x -= 6; // Vitesse de la course

                // Collision
                if (player.x < obs.x + obs.w && player.x + player.w > obs.x &&
                    player.y < obs.y + obs.h && player.y + player.h > obs.y) {
                    // Reset joueur mais garde le score
                    obstacles = [];
                    player.dy = 0;
                }

                // Point gagné quand on dépasse
                if (obs.x + obs.w < player.x && !obs.passed) {
                    obs.passed = true;
                    addXP();
                }

                if (obs.x + obs.w < 0) obstacles.splice(i, 1);
            });
        }

        function addXP() {
            score += 10; // 10 XP par obstacle
            document.getElementById('score-text').innerText = "XP : " + score;
            
            // Barre XP
            let next = milestones.find(m => m > score) || 3000;
            let prev = [...milestones].reverse().find(m => m <= score) || 0;
            let percent = ((score - prev) / (next - prev)) * 100;
            document.getElementById('xp-bar').style.width = percent + "%";

            // Level Up Check
            milestones.forEach((m, idx) => {
                if (score === m) { openLoot(m, ranks[idx+1]); }
            });
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Sol néon
            ctx.strokeStyle = '#00d2ff';
            ctx.lineWidth = 4;
            ctx.beginPath();
            ctx.moveTo(0, canvas.height - 50);
            ctx.lineTo(canvas.width, canvas.height - 50);
            ctx.stroke();

            // Joueur (Cube Néon)
            ctx.fillStyle = '#f0f';
            ctx.shadowBlur = 15;
            ctx.shadowColor = '#f0f';
            ctx.fillRect(player.x, player.y, player.w, player.h);

            // Obstacles
            ctx.fillStyle = '#ff3366';
            ctx.shadowColor = '#ff3366';
            obstacles.forEach(obs => {
                ctx.fillRect(obs.x, obs.y, obs.w, obs.h);
            });
            ctx.shadowBlur = 0;
        }

        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }

        function openLoot(val, rankName) {
            gameActive = false;
            document.getElementById('rank-name').innerText = "RANG : " + rankName;
            const imgPath = `rewards_${val}.png`; // Utilise tes fichiers rewards_XXX.png
            document.getElementById('reward-img').src = imgPath;
            document.getElementById('dl-link').href = imgPath;
            document.getElementById('reward-modal').classList.add('active');
        }

        function closeLoot() {
            document.getElementById('reward-modal').classList.remove('active');
            gameActive = true;
        }

        window.addEventListener('touchstart', () => {
            if (!hasClickedOnce) { window.open(DIRECT_LINK, '_blank'); hasClickedOnce = true; }
            if (player.grounded) {
                player.dy = -player.jumpForce;
                player.grounded = false;
            }
        });

        gameLoop();
    </script>
</body>
    </html>
