<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Aʀᴛㅤᴇᴜʀᴏㅤ❕ - KINETIC RUNNER RPG</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Teko:wght@500;700&display=swap');
        body { margin: 0; background: #000; color: #fff; font-family: 'Teko', sans-serif; overflow: hidden; touch-action: manipulation; }
        
        #hud { position: absolute; top: 0; width: 100%; padding: 15px; box-sizing: border-box; z-index: 100; background: linear-gradient(to bottom, rgba(0,0,0,0.8), transparent); }
        .stats { display: flex; justify-content: space-between; font-size: 22px; color: #00d2ff; text-shadow: 0 0 10px #00d2ff; }
        .xp-box { width: 100%; background: #222; height: 12px; border-radius: 6px; margin-top: 8px; border: 1px solid #444; overflow: hidden; }
        #xp-bar { height: 100%; width: 0%; background: linear-gradient(90deg, #00d2ff, #f0f); transition: 0.3s; }

        canvas { display: block; }

        /* MODAL DE RÉCOMPENSE */
        #reward-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.95); display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 2000; }
        #reward-modal.active { display: flex; }
        #reward-img { width: 80%; max-width: 350px; border: 3px solid #f0f; border-radius: 15px; box-shadow: 0 0 30px #f0f; margin-bottom: 20px; }
        
        .btn-ui { padding: 12px 25px; border: none; font-family: 'Teko'; font-size: 20px; border-radius: 5px; text-decoration: none; cursor: pointer; text-transform: uppercase; }
        .btn-get { background: #00d2ff; color: #000; margin-right: 10px; }
        .btn-next { background: #f0f; color: #fff; }
    </style>
</head>
<body>

    <div id="hud">
        <div class="stats">
            <span id="rank-name">RANG : RECRUE</span>
            <span id="score-text">XP : 0</span>
        </div>
        <div class="xp-box"><div id="xp-bar"></div></div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <div id="reward-modal">
        <h1 style="color:#0ff; text-shadow: 0 0 10px #0ff;">OBJECTIF ATTEINT !</h1>
        <img id="reward-img" src="" alt="Loot">
        <div style="display:flex;">
            <a id="dl-link" href="" download class="btn-ui btn-get">RÉCUPÉRER</a>
            <button onclick="closeLoot()" class="btn-ui btn-next">CONTINUER</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        const DIRECT_LINK = "https://www.profitablecpmratenetwork.com/zr3rrt9c?key=41a9267d8ee0f4fe87afc967f3adad71";
        let hasClickedOnce = false;
        
        // --- CHARGEMENT DE TES IMAGES ---
        const imgPlayer = new Image();
        imgPlayer.src = 'player.png'; 
        const imgObstacle = new Image();
        imgObstacle.src = 'barrière.png';

        let score = 0;
        let milestones = [100, 500, 1000, 1300, 1500, 2000, 2600, 3000];
        let ranks = ["Recrue", "Bronze Antique", "Diamant Noir", "Cyber Élite", "Maître Éclat", "Mythe Phonk", "Art Euro Suprême", "Titan Cosmique", "Dieu Matrice"];
        let gameActive = true;

        let player = { 
            x: 60, y: canvas.height - 210, w: 110, h: 160, 
            dy: 0, jumpForce: 18, gravity: 0.7, grounded: false, 
            animFrame: 0 
        };
        let obstacles = [];
        let spawnTimer = 0;

        // --- SYSTÈME D'ARTICULATION VIRTUEL ---
        function drawJoints(px, py, pw, ph, frame) {
            ctx.save();
            const time = frame * 0.15;
            const bounce = Math.sin(time) * 5;
            
            // Positions relatives des articulations (estimées sur ton image player.png)
            const joints = [
                { id: 'tête', x: px + pw*0.55, y: py + ph*0.15 + bounce },
                { id: 'épaule', x: px + pw*0.45, y: py + ph*0.35 + bounce },
                { id: 'coude', x: px + pw*0.30 + Math.cos(time)*10, y: py + ph*0.45 },
                { id: 'hanche', x: px + pw*0.50, y: py + ph*0.60 },
                { id: 'genou', x: px + pw*0.55 + Math.sin(time)*15, y: py + ph*0.80 },
                { id: 'pied', x: px + pw*0.45 + Math.sin(time+0.5)*20, y: py + ph*0.95 }
            ];

            // Dessin des os néon
            ctx.strokeStyle = '#0ff';
            ctx.lineWidth = 2;
            ctx.shadowBlur = 5;
            ctx.shadowColor = '#0ff';
            
            ctx.beginPath();
            ctx.moveTo(joints[1].x, joints[1].y); ctx.lineTo(joints[2].x, joints[2].y); // Bras
            ctx.moveTo(joints[3].x, joints[3].y); ctx.lineTo(joints[4].x, joints[4].y); // Cuisse
            ctx.lineTo(joints[5].x, joints[5].y); // Jambe
            ctx.stroke();

            // Dessin des points d'articulation
            ctx.fillStyle = '#fff';
            joints.forEach(j => {
                ctx.beginPath();
                ctx.arc(j.x, j.y, 3, 0, Math.PI*2);
                ctx.fill();
            });
            ctx.restore();
        }

        function spawnObstacle() {
            obstacles.push({ x: canvas.width, y: canvas.height - 130, w: 70, h: 80, passed: false });
        }

        function update() {
            if (!gameActive) return;

            player.dy += player.gravity;
            player.y += player.dy;
            player.animFrame++;

            if (player.y + player.h > canvas.height - 50) {
                player.y = canvas.height - 50 - player.h;
                player.dy = 0;
                player.grounded = true;
            }

            spawnTimer++;
            if (spawnTimer > 90) { spawnObstacle(); spawnTimer = 0; }

            obstacles.forEach((obs, i) => {
                obs.x -= 7;

                // Collision avec ta barrière.png
                if (player.x < obs.x + obs.w - 10 && player.x + player.w - 20 > obs.x + 10 &&
                    player.y + player.h > obs.y + 10) {
                    obstacles = []; // Reset obstacles en cas de choc
                }

                if (obs.x + obs.w < player.x && !obs.passed) {
                    obs.passed = true;
                    addXP();
                }
                if (obs.x + obs.w < 0) obstacles.splice(i, 1);
            });
        }

        function addXP() {
            score += 10;
            document.getElementById('score-text').innerText = "XP : " + score;
            let next = milestones.find(m => m > score) || 3000;
            let prev = [...milestones].reverse().find(m => m <= score) || 0;
            let percent = ((score - prev) / (next - prev)) * 100;
            document.getElementById('xp-bar').style.width = percent + "%";
            
            milestones.forEach((m, idx) => {
                if (score === m) openLoot(m, ranks[idx+1]);
            });
        }

        function draw() {
            ctx.fillStyle = '#050505';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Sol
            ctx.strokeStyle = '#0ff'; ctx.lineWidth = 3;
            ctx.beginPath(); ctx.moveTo(0, canvas.height-50); ctx.lineTo(canvas.width, canvas.height-50); ctx.stroke();

            // 1. Dessiner le JOUEUR (player.png)
            if (imgPlayer.complete) {
                ctx.save();
                // Effet de balancement pendant la course
                let tilt = player.grounded ? Math.sin(player.animFrame * 0.15) * 0.03 : 0;
                ctx.translate(player.x + player.w/2, player.y + player.h/2);
                ctx.rotate(tilt);
                ctx.drawImage(imgPlayer, -player.w/2, -player.h/2, player.w, player.h);
                ctx.restore();
            }

            // 2. Dessiner les ARTICULATIONS par-dessus
            drawJoints(player.x, player.y, player.w, player.h, player.animFrame);

            // 3. Dessiner les BARRIÈRES (barrière.png)
            obstacles.forEach(obs => {
                if (imgObstacle.complete) {
                    ctx.drawImage(imgObstacle, obs.x, obs.y, obs.w, obs.h);
                }
            });
        }

        function openLoot(val, rankName) {
            gameActive = false;
            document.getElementById('rank-name').innerText = "RANG : " + rankName;
            const imgPath = `rewards_${val}.png`;
            document.getElementById('reward-img').src = imgPath;
            document.getElementById('dl-link').href = imgPath;
            document.getElementById('reward-modal').classList.add('active');
        }

        function closeLoot() {
            document.getElementById('reward-modal').classList.remove('active');
            gameActive = true;
        }

        function gameLoop() { update(); draw(); requestAnimationFrame(gameLoop); }

        window.addEventListener('touchstart', () => {
            if (!hasClickedOnce) { window.open(DIRECT_LINK, '_blank'); hasClickedOnce = true; }
            if (player.grounded && gameActive) {
                player.dy = -player.jumpForce;
                player.grounded = false;
            }
        });

        imgPlayer.onload = () => { gameLoop(); };
    </script>
</body>
</html>
